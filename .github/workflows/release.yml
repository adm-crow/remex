name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: studio/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: studio
        run: npm ci

      - name: Download uv.exe for bundling
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile "uv.zip" -UseBasicParsing
          Expand-Archive -Path "uv.zip" -DestinationPath "uv-dist" -Force
          $uvExe = Get-ChildItem -Path "uv-dist" -Filter "uv.exe" -Recurse | Select-Object -First 1
          if (-not $uvExe) { throw "uv.exe not found inside uv archive" }
          New-Item -ItemType Directory -Force -Path "studio/src-tauri/resources" | Out-Null
          Copy-Item $uvExe.FullName "studio/src-tauri/resources/uv.exe"
          Remove-Item "uv.zip", "uv-dist" -Recurse -Force
          $size = (Get-Item "studio/src-tauri/resources/uv.exe").Length
          Write-Host "uv.exe ready ($size bytes)"

      - name: Download default ONNX model for bundling
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "onnx.tar.gz" -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "studio/src-tauri/resources/onnx/all-MiniLM-L6-v2" | Out-Null
          tar -xzf onnx.tar.gz --strip-components=1 -C studio/src-tauri/resources/onnx/all-MiniLM-L6-v2
          Remove-Item "onnx.tar.gz" -Force
          $files = Get-ChildItem "studio/src-tauri/resources/onnx/all-MiniLM-L6-v2" -File
          Write-Host "ONNX model files: $($files.Count) files"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — add these secrets to enable signed releases):
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # macOS:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Remex Studio ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.
          releaseDraft: true
          prerelease: false
          projectPath: studio
          args: ${{ matrix.args }}
